services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kaj
      POSTGRES_PASSWORD: kaj_password
      POSTGRES_DB: kaj_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaj -d kaj_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://kaj:kaj_password@db:5432/kaj_ai
      JWT_SECRET_KEY: change-this-secret-in-production
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
